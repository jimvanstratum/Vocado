<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Vocado app icon — avocado half met V op pit -->
  <!-- Witte iOS-stijl achtergrond -->
  <rect width="512" height="512" rx="113" fill="#FFFFFF"/>

  <!-- Avocado schil (donker bosgroen buitenring) -->
  <path d="M256,40 C338,40 447,170 447,308
           C447,432 376,474 256,476
           C136,478 65,432 65,308
           C65,170 174,40 256,40 Z"
        fill="#17492C"/>

  <!-- Avocado mid-laag (olijfgroen) -->
  <path d="M256,58 C332,58 426,182 426,310
           C426,420 360,457 256,459
           C152,461 86,420 86,310
           C86,182 180,58 256,58 Z"
        fill="#88BF42"/>

  <!-- Avocado vruchtvlees (licht geelgroen) -->
  <path d="M256,76 C326,76 406,193 406,311
           C406,410 346,441 256,443
           C166,443 106,410 106,311
           C106,193 186,76 256,76 Z"
        fill="#CCDA6E"/>

  <!-- Pit buitenrand (zeer donkerbruin) -->
  <circle cx="256" cy="314" r="95" fill="#5E2C06"/>

  <!-- Pit hoofdvlak (zadelbruin) -->
  <circle cx="256" cy="314" r="86" fill="#884213"/>

  <!-- Pit glans (warm halftransparant highlight) -->
  <ellipse cx="228" cy="284" rx="28" ry="19" fill="#A55E2A" opacity="0.55"/>

  <!-- Witte V (vet, gecentreerd op pit) -->
  <path d="M203,264 L228,264 L256,334 L284,264 L309,264 L256,353 Z"
        fill="white"/>
</svg>
