<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- CONCEPT B: OPEN BOEK — Pagina's vormen een V -->
  <!-- Achtergrond (warm donkergroen) -->
  <rect width="512" height="512" rx="114" fill="#1A2E1E"/>

  <!-- Linker pagina (lichte crème) -->
  <path d="M256,96 L68,122 Q58,124 58,134 L58,398 Q58,408 68,408 L256,390 Z"
        fill="#F5EDD8"/>

  <!-- Rechter pagina (iets warmer crème) -->
  <path d="M256,96 L444,122 Q454,124 454,134 L454,398 Q454,408 444,408 L256,390 Z"
        fill="#EDE4C8"/>

  <!-- Boekrug / rug schaduw -->
  <rect x="250" y="94" width="12" height="298" rx="4" fill="#C8BA98"/>

  <!-- Tekstregels linker pagina -->
  <line x1="88" y1="160" x2="236" y2="155" stroke="#C8BA98" stroke-width="7" stroke-linecap="round"/>
  <line x1="88" y1="185" x2="236" y2="181" stroke="#C8BA98" stroke-width="7" stroke-linecap="round"/>
  <line x1="88" y1="210" x2="200" y2="207" stroke="#C8BA98" stroke-width="7" stroke-linecap="round"/>
  <line x1="88" y1="250" x2="236" y2="247" stroke="#C8BA98" stroke-width="7" stroke-linecap="round"/>
  <line x1="88" y1="275" x2="180" y2="272" stroke="#C8BA98" stroke-width="7" stroke-linecap="round"/>
  <line x1="88" y1="300" x2="236" y2="297" stroke="#C8BA98" stroke-width="7" stroke-linecap="round"/>
  <line x1="88" y1="340" x2="236" y2="338" stroke="#C8BA98" stroke-width="7" stroke-linecap="round"/>
  <line x1="88" y1="365" x2="160" y2="363" stroke="#C8BA98" stroke-width="7" stroke-linecap="round"/>

  <!-- Tekstregels rechter pagina -->
  <line x1="276" y1="160" x2="424" y2="155" stroke="#B8AA88" stroke-width="7" stroke-linecap="round"/>
  <line x1="276" y1="185" x2="424" y2="181" stroke="#B8AA88" stroke-width="7" stroke-linecap="round"/>
  <line x1="276" y1="210" x2="380" y2="207" stroke="#B8AA88" stroke-width="7" stroke-linecap="round"/>
  <line x1="276" y1="250" x2="424" y2="247" stroke="#B8AA88" stroke-width="7" stroke-linecap="round"/>
  <line x1="276" y1="275" x2="360" y2="272" stroke="#B8AA88" stroke-width="7" stroke-linecap="round"/>
  <line x1="276" y1="300" x2="424" y2="297" stroke="#B8AA88" stroke-width="7" stroke-linecap="round"/>
  <line x1="276" y1="340" x2="424" y2="338" stroke="#B8AA88" stroke-width="7" stroke-linecap="round"/>
  <line x1="276" y1="365" x2="340" y2="363" stroke="#B8AA88" stroke-width="7" stroke-linecap="round"/>

  <!-- Groen boekenlegger lint (subtiele avocado-knipoog) -->
  <rect x="148" y="58" width="22" height="80" rx="4" fill="#6ECF7E"/>
  <polygon points="148,138 159,156 170,138" fill="#6ECF7E"/>

  <!-- "V" gevormd door de open boekrug — al aanwezig door de paginahoek -->
  <!-- Kleine groene V-markering als leesbladwijzer op rechterpagina -->
  <path d="M318,168 L330,168 L344,196 L358,168 L370,168 L344,206 Z"
        fill="#6ECF7E" opacity="0.85"/>
</svg>
